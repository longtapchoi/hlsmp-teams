command-usage: |
  &#34eb9b&lTEAM
  &#34eb9b➤ &f/team &7- Mở giao diện team
  &#34eb9b➤ &f/team create <tên> &7- Tạo team
  &#34eb9b➤ &f/team invite <người chơi> &7- Mời vào team
  &#34eb9b➤ &f/team join <team> &7- Gia nhập team
  &#34eb9b➤ &f/team leave &7- Rời team
  &#34eb9b➤ &f/team kick <người chơi> &7- Kick thành viên
  &#34eb9b➤ &f/team delete &7- Giải tán team
  &#34eb9b➤ &f/team transfer <người chơi> &7- Chuyển quyền
  &#34eb9b➤ &f/team sethome &7- Đặt home team
  &#34eb9b➤ &f/team home &7- Teleport home team
  &#34eb9b➤ &f/team delhome &7- Xóa home team
  &#34eb9b➤ &f/team chat <tin nhắn> &7- Chat nội bộ
  &#34eb9b➤ &f/team chat toggle &7- Bật/tắt chat team

